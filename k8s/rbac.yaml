apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-dashboard
  namespace: lossnear-system
---
# Droits limités à ce que le dashboard sait faire : lecture cluster,
# suppression de pods, scaling/redémarrage de deployments, métriques.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lossnear-k8s-dashboard
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lossnear-k8s-dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lossnear-k8s-dashboard
subjects:
  - kind: ServiceAccount
    name: k8s-dashboard
    namespace: lossnear-system

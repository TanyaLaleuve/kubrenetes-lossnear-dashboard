# TLS terminé par le nginx hôte (certbot) qui proxifie vers le NodePort 30080
# de ingress-nginx. Pas de section tls ici.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k8s-dashboard
  namespace: lossnear-system
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 1m
    # Console SSE : connexions longues
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: k8s.lossnear.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: k8s-dashboard
                port:
                  name: http
    # Domaine public du bot : même application (le middleware Next réécrit la
    # racine de dashboard.lossnear.com vers le dashboard bot).
    - host: dashboard.lossnear.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: k8s-dashboard
                port:
                  name: http

# Ne PAS committer le vrai secret. Créer en ligne de commande :
#
#   kubectl -n lossnear-system create secret generic k8s-dashboard-env \
#     --from-literal=SESSION_SECRET="$(openssl rand -base64 48)" \
#     --from-literal=ADMIN_USER="admin" \
#     --from-literal=ADMIN_PASSWORD_HASH='<hash bcrypt>'
#
# Hash bcrypt : node scripts/hash-password.mjs "monMotDePasse"
apiVersion: v1
kind: Secret
metadata:
  name: k8s-dashboard-env
  namespace: lossnear-system
type: Opaque
stringData:
  SESSION_SECRET: "CHANGER-MOI-48-caracteres-aleatoires"
  ADMIN_USER: "admin"
  ADMIN_PASSWORD_HASH: "$2a$12$exemple"

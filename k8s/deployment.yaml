apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-dashboard
  namespace: lossnear-system
  labels:
    app.kubernetes.io/name: k8s-dashboard
    app.kubernetes.io/part-of: lossnear
spec:
  # Dashboard admin : volontairement non autoscalé.
  # L'anti brute-force du login est en mémoire process → garder 1 replica.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-dashboard
        app.kubernetes.io/part-of: lossnear
    spec:
      serviceAccountName: k8s-dashboard
      securityContext:
        runAsNonRoot: true
      containers:
        - name: dashboard
          image: ghcr.io/tanyalaleuve/kubrenetes-lossnear-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: k8s-dashboard-env
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-dashboard
  namespace: lossnear-system
  labels:
    app.kubernetes.io/name: k8s-dashboard
spec:
  selector:
    app.kubernetes.io/name: k8s-dashboard
  ports:
    - name: http
      port: 80
      targetPort: http

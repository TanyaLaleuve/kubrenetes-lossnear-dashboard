# Vhost nginx hôte pour k8s.lossnear.com (à placer dans
# /etc/nginx/sites-available/ puis lier dans sites-enabled/).
# Le TLS est ajouté par certbot : certbot --nginx -d k8s.lossnear.com
#
# proxy_buffering off + gzip off sont INDISPENSABLES : sans eux le nginx hôte
# met le flux SSE de la console serveur en tampon et rien n'atteint le
# navigateur (symptôme : « Connexion à la console… » figé).
server {
    listen 80;
    listen [::]:80;
    server_name k8s.lossnear.com;

    location / {
        proxy_pass http://127.0.0.1:30080;   # NodePort de ingress-nginx
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;   # console SSE : connexions longues
        proxy_buffering off;        # SSE : pas de mise en tampon
        gzip off;                   # SSE : pas de compression bufferisante
    }
}

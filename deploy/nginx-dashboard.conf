# Vhost nginx hôte pour dashboard.lossnear.com (dashboard bot public).
# À placer dans /etc/nginx/sites-available/ puis lier dans sites-enabled/.
# Le TLS est ajouté par certbot : certbot --nginx -d dashboard.lossnear.com
#
# Même backend que k8s.lossnear.com (NodePort 30080 de ingress-nginx) : c'est
# la même application Next, le routage par hôte est fait côté ingress + middleware.
# proxy_buffering off + gzip off : nécessaires si des flux SSE passent ici.
server {
    listen 80;
    listen [::]:80;
    server_name dashboard.lossnear.com;

    location / {
        proxy_pass http://127.0.0.1:30080;   # NodePort de ingress-nginx
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_buffering off;
        gzip off;
    }
}

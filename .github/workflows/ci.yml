name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          SESSION_SECRET: ci-only-secret-not-used-in-production-0000
          ADMIN_USER: ci
          ADMIN_PASSWORD_HASH: $2a$12$ciplaceholderciplaceholderciplacehold

  docker-image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/tanyalaleuve/kubrenetes-lossnear-dashboard:latest
            ghcr.io/tanyalaleuve/kubrenetes-lossnear-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
